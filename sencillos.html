<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🎧 Blackmoon Records Sencillos</title>

<style>
:root{
    --color-boton:#2ecc71;
}

body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#0b0b0f;
    color:white;
}

/* HERO */
.hero{
    height:70vh;
    background-image:url("721770.png");
    background-size:cover;
    background-position:center;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    box-shadow: inset 0 0 0 2000px rgba(0,0,0,.55);
}

.hero h1{
    font-size:90px;
    color:#2ecc71;
    margin:0;
}

.hero p{
    max-width:850px;
    font-size:22px;
    margin-top:20px;
}

/* CANCIONES */
.canciones{
    padding:60px 20px;
    text-align:center;
}

.canciones h2{
    font-size:45px;
}

/* BOTONES */
button{
    padding:15px 25px;
    margin:10px 0 30px 0;
    font-size:16px;
    font-weight:bold;
    border:none;
    border-radius:12px;
    background:var(--color-boton);
    color:black;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:scale(1.1);
    box-shadow:0 0 20px var(--color-boton);
}

/* LETRAS */
.letras{
    max-width:900px;
    margin:60px auto;
    padding-top:40px;
    border-top:2px solid rgba(255,255,255,.2);
}

.letras h3{
    font-size:32px;
    color:#2ecc71;
    text-align:center;
}

.letras pre{
    white-space:pre-wrap;
    font-size:18px;
    line-height:1.8;
    color:#ddd;
}

/* FOOTER */
footer{
    margin-top:60px;
    padding:30px 0;
    background: linear-gradient(90deg,#8A2BE2,#FF1493,#FFA500,#00CED1);
    display:flex;
    justify-content:center;
    gap:50px;
}

footer a img{
    width:55px;
    transition:.3s;
}

footer a img:hover{
    transform:scale(1.2);
}
</style>
</head>

<body>

<section class="hero">
    <h1>Blackmoon Records sencillos</h1>
    <p>🌗 Blackmoon Records · Sencillos ...</p>
</section>

<section class="canciones">

<h2>BAJO LA NOCHE</h2>
<iframe src="https://open.spotify.com/embed/album/5PB6V8DcKyWe0FTY7ZH7mG" width="100%" height="152"></iframe>
<button onclick="reproducirCancion('audio/bajo-la-noche.mp3')">▶ Reproducir</button>

<h2>CADENAS DEL ALMA</h2>
<iframe src="https://open.spotify.com/embed/album/1JvKp46ZsvXDXrbiH6bcbN" width="100%" height="152"></iframe>
<button onclick="reproducirCancion('audio/cadenas.mp3')">▶ Reproducir</button>

<h2>ENTRE EL VUELO Y LA PIEL</h2>
<iframe src="https://open.spotify.com/embed/album/6MO5OM79nXN5zl8g0Pjh76" width="100%" height="152"></iframe>
<button onclick="reproducirCancion('audio/vuelo.mp3')">▶ Reproducir</button>

<h2>NUDOS DE AMOR Y TRAICION</h2>
<iframe src="https://open.spotify.com/embed/album/4oLnnAMNXMZgaEdtfUmt48" width="100%" height="152"></iframe>
<button onclick="reproducirCancion('audio/nudos.mp3')">▶ Reproducir</button>

<h2>BLACKMOON Y SUS ESTRELLAS</h2>
<iframe src="https://open.spotify.com/embed/album/0nIRHqqvFNH5qLASm6jiFM" width="100%" height="152"></iframe>
<button onclick="reproducirCancion('audio/estrellas.mp3')">▶ Reproducir</button>

</section>

<!-- REPRODUCTOR -->
<audio id="player" controls style="width:100%; margin-top:20px;"></audio>

<section class="letras" id="zonaLetra">
    <h3 id="tituloLetra">Letra</h3>
    <pre id="textoLetra">
Selecciona una canción para ver la letra aquí.
    </pre>
</section>

<footer>
    <a href="#"><img src="Imagen de WhatsApp 2025-11-02.jpg"></a>
    <a href="#"><img src="BKM PODCAST 2.0.jpg"></a>
    <a href="#"><img src="PRODUCTOS BKM 2.O.jpg"></a>
</footer>

<script>
function reproducirCancion(src){
    const player = document.getElementById("player");
    player.src = src;
    player.play();
}
</script>

</body>
</html>
